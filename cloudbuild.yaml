steps:
  # Download data files from GCS
  - name: "gcr.io/cloud-builders/gsutil"
    args:
      [
        "cp",
        "gs://mochipc-data/heartgold-pokemon.json",
        "data/heartgold-pokemon.json",
      ]

  - name: "gcr.io/cloud-builders/gsutil"
    args:
      [
        "cp",
        "gs://mochipc-data/heartgold-moves.json",
        "data/heartgold-moves.json",
      ]

  # Build and push Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/${PROJECT_ID}/mochipc:${SHORT_SHA}", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/${PROJECT_ID}/mochipc:${SHORT_SHA}"]

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "mochipc"
      - "--image=gcr.io/${PROJECT_ID}/mochipc:${SHORT_SHA}"
      - "--region=europe-west1"
      - "--memory=1Gi"
      - "--max-instances=1"
      - "--cpu-boost"
      - "--allow-unauthenticated"

images:
  - "gcr.io/${PROJECT_ID}/mochipc:${SHORT_SHA}"

options:
  logging: CLOUD_LOGGING_ONLY
